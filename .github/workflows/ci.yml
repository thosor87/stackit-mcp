name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  pricing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pricing
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: pricing/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  resources:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resources
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: resources/package-lock.json
      - run: npm ci
      - run: npm run build
